<section class="session-setup">
  @if (error()) {
    <app-error-banner [message]="error()!" (dismissed)="dismissError()" />
  }

  @if (loading()) {
    <app-loading-spinner message="Loading game..." />
  } @else if (game(); as game) {
    <button class="session-setup__back" type="button" (click)="goBack()">
      &lsaquo; Back to {{ game.name }}
    </button>

    <header class="session-setup__header">
      <div class="session-setup__game-image">
        @if (game.cover_image_url) {
          <img
            [src]="game.cover_image_url"
            [alt]="game.name + ' cover image'"
            class="session-setup__cover"
          />
        } @else {
          <div class="session-setup__placeholder" aria-hidden="true">&#x1F3B2;</div>
        }
      </div>
      <div class="session-setup__game-info">
        <h1 class="session-setup__title">New Session</h1>
        <p class="session-setup__game-name">{{ game.name }}</p>
      </div>
    </header>

    <form class="session-setup__form" (submit)="$event.preventDefault(); startSession()">
      @if (game.expansions.length > 0) {
        <app-expansion-selection
          [expansions]="game.expansions"
          [selectedIds]="selectedExpansionIds()"
          (selectionChange)="onExpansionChange($event)"
        />
      }

      <app-player-count-input [value]="playerCount()" (valueChange)="onPlayerCountChange($event)" />

      <div class="session-setup__name-field">
        <label class="session-setup__name-label" for="session-name">Session Name</label>
        <input
          class="session-setup__name-input"
          id="session-name"
          type="text"
          [value]="sessionName()"
          (input)="onNameInput($event)"
          maxlength="200"
          required
        />
      </div>

      <button class="session-setup__submit" type="submit" [disabled]="creating()">
        @if (creating()) {
          Creating...
        } @else {
          Start Session
        }
      </button>
    </form>
  }
</section>
